name: Terraform Destroy – Unleash live Assessment

on:
  workflow_dispatch:

env:
  TF_VERSION:     "1.7.5"
  PYTHON_VERSION: "3.12"
  AWS_REGION:     "us-east-1"
  TF_STATE_KEY:   "assignment/terraform.tfstate"

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Build Lambda ZIPs (required for init)
        run: |
          cd modules/compute/lambdas
          zip greeter.zip greeter.py
          zip dispatcher.zip dispatcher.py

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.TF_ROLE_ARN }}
          role-session-name: destroy
          aws-region:        ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=us-east-1"

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var="candidate_email=${{ secrets.CANDIDATE_EMAIL }}" \
            -var="github_repo=${{ secrets.CANDIDATE_REPO }}" \
            -var="cognito_test_password=${{ secrets.COGNITO_PASSWORD }}"